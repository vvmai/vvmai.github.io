<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>brainvomit</title>
    <script>
      // SPA deep-link fix (rafgraph/spa-github-pages): encode the path into a
      // query string and bounce to the app root, which decodes it back. Lets a
      // refreshed/bookmarked sub-page restore that exact page.
      // pathSegmentsToKeep=1 keeps the /<repo>/ project-pages prefix.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
