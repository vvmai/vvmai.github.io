project:
  type: website
  output-dir: _site
  # Pages live in pages/ but read project-root paths (analysis/, data/, assets/),
  # so run every doc from the project root.
  execute-dir: project
  resources:
    - assets/hexes.geojson   # shared hex geometry the NYC maps fetch by URL

website:
  title: "brainvomit"          # browser-tab text / metadata
  favicon: assets/flower.svg   # 🌸 tab icon
  # High-level sections live in the top navbar; the matching left sidebar shows
  # that section's pages; a page outline appears on the right (toc: true).
  search:
    location: navbar
    type: textbox      # inline box in the navbar, not the overlay popup
  navbar:
    background: primary
    title: "🌸"                # pink-flower brand (emoji as text renders reliably)
    left:
      - text: "About"
        href: index.qmd
      - text: "Projects"
        href: pages/neurosymbolic.qmd
      - text: "Art"
        href: art/index.qmd
      - text: "Blog"
        href: blog/index.qmd
    right:
      - icon: github
        href: https://github.com/vvmai
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/vvmai
        aria-label: LinkedIn
  sidebar:
    - title: "Projects"
      style: docked
      contents:
        - section: "Studies"
          contents:
            - text: "Neurosymbolic solver for deductive trading"
              href: pages/neurosymbolic.qmd
            - text: "Conway's blobs"
              href: pages/blobsim.qmd
            - text: "Plotting my next move"
              href: pages/nyc.qmd
        - section: "Toys"
          contents:
            - text: "Puppy weight predictor"
              href: pages/puppy.qmd
            - text: "Slim Jim percentage"
              href: pages/slim-jim.qmd
            - text: "Is grad school worth it?"
              href: pages/grad-school.qmd
    - title: "Art"
      style: docked
      contents:
        - art/index.qmd
    - title: "Blog"
      style: docked
      contents:
        - blog/index.qmd

format:
  html:
    theme: assets/brite.scss
    toc: true

execute:
  # Heavy Python cells (NYC, blobsim) execute locally once; outputs cached in
  # _freeze/ (committed) so CI deploys without geopandas/blobsim or the raw data.
  freeze: auto
