project:
  type: website
  output-dir: _site
  resources:
    - hexes.geojson   # shared hex geometry the NYC maps fetch by URL

website:
  title: "brainvomit"
  favicon: photos/IMG_0830.jpg
  search:
    location: sidebar
    type: textbox
  sidebar:
    style: docked
    search: true
    contents:
      - text: "About"
        href: index.qmd
      - text: "Puppy weight calculator"
        href: puppy.qmd
      - text: "Slim Jim percentage"
        href: slim-jim.qmd
      - text: "Plotting my next move"
        href: nyc.qmd
      - text: "Is grad school worth it?"
        href: grad-school.qmd

format:
  html:
    theme: brite.scss

# Heavy Python cells (the NYC analysis) execute locally once; outputs are cached
# in _freeze/ and committed, so CI deploys without geopandas or the raw data.
execute:
  freeze: auto
