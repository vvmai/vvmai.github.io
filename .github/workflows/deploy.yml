name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      # nyc.qmd is frozen (outputs cached in _freeze/), so its Python cells never
      # run here — but Quarto still resolves the kernel *name* before reading the
      # cache. Register an (unused) "brainvomit" kernel so that resolution passes.
      - name: Register kernel name (never executed; freeze provides outputs)
        run: |
          python3 -m pip install --quiet ipykernel
          python3 -m ipykernel install --user --name brainvomit

      # Python cells are pre-executed and cached in _freeze/, so the build needs
      # no geopandas/data — Quarto reuses the frozen output.
      - name: Render site
        run: quarto render

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
