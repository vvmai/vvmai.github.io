        - generic [ref=e106]:
          - paragraph [ref=e107]: "In the Summer of 2024, my lease was up. Instead of looking for an apartment, I procrastinated by making a map of NYC's most desirable neighborhoods, which is universally agreed to consist of three things:"
          - list [ref=e108]:
            - listitem [ref=e109]: Subways
            - listitem [ref=e110]: Trees
            - listitem [ref=e111]: Food
        - heading "1 Subways" [level=2] [ref=e116]: 1 Subways
        - paragraph [ref=e121]:
          - text: If you know me, you know that I am lazy. I am willing to walk 11 mins
          - emphasis [ref=e122]: max
          - text: from my apartment to the subway. That said, if the walk happens to pass by multiple coffee shops and the station can get me downtown in 20 mins, I may be willing to go a little farther... clearly, even my basest instincts recognize there is some nuance to what it means to be 'well-connected'.
        - paragraph [ref=e126]:
          - text: "A subway station can be valuable in two ways: 1) It can get you to a desirable place, and 2) It"
          - emphasis [ref=e127]: is
          - text: the desirable place.
        - paragraph [ref=e131]: Number 1 hints at some graph shenanigans going on here. If you can capture the NYC subway system in the form of a graph, where each node is a subway station and each edge is the subway line(s) which connect them, then you can calculate the eigenvector centrality metric for each node (i.e. station), which is exactly what I did below.
        - generic [ref=e139]:
          - button "Fullscreen" [ref=e144] [cursor=pointer]:
            - img [ref=e145]
          - generic [ref=e149]:
            - img "0" [ref=e150]
            - paragraph [ref=e153]: NYC subway system represented as a graph.
        - paragraph [ref=e158]: "Intuitively, the eigenvector centrality answers the question: is this station connected to other stations that are themselves well-connected? In order words, it is not enough for one station to be connected to many other stations — the other stations must themselves be well-connected."
        - paragraph [ref=e162]: Number 2 is a bit more straightforward. To measure whether the node (station) itself is desirable, I use ridership. The more people swipe into this station, the more desirable it is (either because many people live nearby or because many people get off here and later swipe back through to get home.) The final centrality score is an equal weighted average of ridership and centrality.*
        - paragraph [ref=e166]: "*For the nitpicky reader, I would much rather have calculated a node-weighted eigenvector centrality score to begin with, but this gets me 90% of the way there and runs out-of-the-box, and that's good enough for me."
