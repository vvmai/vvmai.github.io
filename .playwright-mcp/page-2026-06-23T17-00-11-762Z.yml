        - paragraph [ref=e222]:
          - text: Clearly, NYC proper itself is very well-connected. But there are many pockets in the outer boroughs that are
          - emphasis [ref=e223]: relatively
          - text: well-connected. This is even more relevant if you actually
          - emphasis [ref=e224]: want
