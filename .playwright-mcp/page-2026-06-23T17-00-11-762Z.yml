        - heading "Summary" [level=2] [ref=e270]: Summary
        - paragraph [ref=e275]: To be honest, I don't know how useful of an exercise this was. It mostly just confirmed my intuitions about where the best neighborhoods are (LIC, Williamsburg, Dumbo, Forest Hills, Bushwick, etc.) You might also notice that it inflates Manhattan's score a lot, since the city proper ranks high on all 3 metrics. Maybe in the future, I'll add a penalty for something like commerciality (Midtown/Chelsea is great for work and shopping... but who wants to live there?) or affordability.
