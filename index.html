<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>brainvomit — Vương</title>
    <script>
      // Deep-link restore. 404.html bounced /<repo>/<page> to /<repo>/?/<page>.
      // stlite derives its base path from location at mount, so we must boot at
      // the clean root (base = /<repo>/) and THEN click the target page's nav
      // link once it appears — the same path a real click takes (which works).
      // replaceState'ing the deep path pre-mount would make stlite treat the
      // whole path as the base and fall back to the home page.
      (function () {
        var l = window.location;
        if (l.search[1] !== "/") return;
        var slug = l.search.slice(2).split("&")[0].split("?")[0];
        window.history.replaceState(null, "", l.pathname + l.hash); // clean URL
        if (!slug) return;
        var want = decodeURIComponent(slug);
        var tries = 0;
        var iv = setInterval(function () {
          if (++tries > 240) return clearInterval(iv); // ~2 min then give up
          var links = document.querySelectorAll('a[href]');
          for (var i = 0; i < links.length; i++) {
            var seg = links[i].getAttribute("href").split("/").pop();
            if (decodeURIComponent(seg) === want) {
              clearInterval(iv);
              links[i].click();
              return;
            }
          }
        }, 500);
      })();
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.css" />
    <style>
      html, body { margin: 0; }
      #root { height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js";

      // Every file the app needs in the in-browser (Pyodide) filesystem.
      // Keys are the FS paths the Python code references; values are fetched
      // from the deployed site. Paths are URL-encoded per segment so names
      // with spaces and "?" resolve correctly.
      const paths = [
        "app.py",
        "About.py",
        "utils.py",
        ".streamlit/config.toml",
        "pages/Puppy weight calculator.py",
        "pages/Slim Jim percentage.py",
        "pages/Plotting my next move.py",
        "pages/Is grad school worth it?.py",
        "photos/IMG_0830.jpg",
        "photos/baby_pippy.png",
        "photos/teen_pip.png",
        "photos/old_pippy.png",
        "assets/maps/nyc_mta_network.png",
        "assets/maps/station_centrality.csv",
        "assets/maps/centrality.html",
        "assets/maps/trees.html",
        "assets/maps/restaurants.html",
        "assets/maps/overall.html",
      ];

      const files = {};
      for (const p of paths) {
        const url = "./" + p.split("/").map(encodeURIComponent).join("/");
        files[p] = { url };
      }

      mount(
        {
          entrypoint: "app.py",
          requirements: ["pandas", "numpy", "scipy", "matplotlib", "shapely"],
          files,
          streamlitConfig: { "client.toolbarMode": "viewer" },
        },
        document.getElementById("root"),
      );
    </script>
  </body>
</html>
